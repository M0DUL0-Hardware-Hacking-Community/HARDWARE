[env]
framework = arduino
build_src_flags =
  -Wall
  -Wextra
  -Werror

[env:esp32devkit_v1]
platform = espressif32@7.0.1
board = esp32doit-devkit-v1
build_flags =
  -D BLINK_LED_PIN=LED_BUILTIN
  -D BLINK_LED_ACTIVE_LOW=0

[env:uno]
platform = atmelavr@5.3.0
board = uno
build_flags =
  -D BLINK_LED_PIN=LED_BUILTIN
  -D BLINK_LED_ACTIVE_LOW=0

[env:nucleo_f401re]
platform = ststm32@19.7.0
board = nucleo_f401re
build_flags =
  -D BLINK_LED_PIN=LED_BUILTIN
  -D BLINK_LED_ACTIVE_LOW=0

[env:pico_rp2040]
platform = raspberrypi@1.20.0
board = pico
build_flags =
  -D BLINK_LED_PIN=LED_BUILTIN
  -D BLINK_LED_ACTIVE_LOW=0
