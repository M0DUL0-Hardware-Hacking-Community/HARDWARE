name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            preset: dev
          - compiler: clang
            cc: clang
            preset: analysis
    name: Linux (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang clang-format clang-tidy cppcheck
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        env:
          CC: ${{ matrix.cc }}
      - name: Build and analyze
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
      - name: Check formatting
        if: matrix.compiler == 'clang'
        run: find apps firmware include platform src tests Projects/Embedded/Blink/src Projects/Embedded/Blink/targets/pico-sdk Projects/Embedded/ConcurrentWifiScanner/src Projects/Embedded/ConcurrentWifiScanner/tests -type f \( -name '*.c' -o -name '*.h' \) -exec clang-format --dry-run --Werror {} +
      - name: Run cppcheck
        if: matrix.compiler == 'clang'
        run: cppcheck --project=build/${{ matrix.preset }}/compile_commands.json --enable=warning,style,performance,portability --error-exitcode=1 --suppress=missingIncludeSystem

  embedded:
    runs-on: ubuntu-latest
    name: Embedded builds
    steps:
      - uses: actions/checkout@v4
      - name: Install PlatformIO
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          python3 -m venv .venv
          .venv/bin/pip install platformio==6.1.19
      - name: Test Wi-Fi scanner domain logic
        run: |
          cmake -S Projects/Embedded/ConcurrentWifiScanner/tests -B build/wifi-scanner -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/wifi-scanner
          ctest --test-dir build/wifi-scanner --output-on-failure
          cppcheck --project=build/wifi-scanner/compile_commands.json --enable=warning,style,performance,portability --error-exitcode=1 --suppress=missingIncludeSystem
      - name: Analyze Blink application
        run: cppcheck Projects/Embedded/Blink/src/main.c Projects/Embedded/Blink/targets/pico-sdk/main.c --force --std=c11 --enable=warning,style,performance,portability --error-exitcode=1 --suppress=missingInclude --suppress=missingIncludeSystem -DBLINK_LED_PIN=2 -DBLINK_LED_ACTIVE_LOW=0 -DBLINK_HALF_PERIOD_MS=500 -DPICO_DEFAULT_LED_PIN=25 -DGPIO_OUT=1
      - name: Build Blink targets
        run: .venv/bin/pio run --project-dir Projects/Embedded/Blink
      - name: Build Wi-Fi scanner firmware
        run: .venv/bin/pio run --project-dir Projects/Embedded/ConcurrentWifiScanner
